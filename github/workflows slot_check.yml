name: DL Slot Monitor

on:
  schedule:
    # Runs every 5 minutes, 24/7, completely free
    - cron: '*/5 * * * *'

  # Also lets you trigger it manually from GitHub if you want
  workflow_dispatch:

jobs:
  check-slots:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run slot checker
        env:
          APP_NUMBER:       ${{ secrets.APP_NUMBER }}
          DOB:              ${{ secrets.DOB }}
          STATE:            ${{ secrets.STATE }}
          RTO:              ${{ secrets.RTO }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py
